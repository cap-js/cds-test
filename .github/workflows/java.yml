name: Java Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  java-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # guard against infinite ping loop on startup failure

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'sapmachine'
          cache: maven         # cache ~/.m2 between runs

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Build Java app
        run: mvn -f test/java-app/pom.xml package -DskipTests

      - name: Run Java integration test
        run: CDS_ENV=java node --test 'test/java-app/**/*.test.js'
