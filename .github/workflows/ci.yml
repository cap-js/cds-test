name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    strategy:
      matrix:
        suite: [lib, node, java]
        node-version: [22, 24]
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      CDS_ENV: ${{ matrix.suite == 'java' && 'java' || '' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        if: matrix.suite == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'sapmachine'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Warm npm cache for Java app
        if: matrix.suite == 'java'
        run: npm ci && rm -rf node_modules
        working-directory: test/runtime/java/app

      - name: Build Java app
        if: matrix.suite == 'java'
        run: mvn -f test/runtime/java/app/pom.xml package -DskipTests

      - name: Node Test Runner
        run: npm run node-test:${{ matrix.suite }}

      - name: Jest
        run: npm run jest:${{ matrix.suite }}

      - name: Vitest
        run: npm run vitest:${{ matrix.suite }}

      - name: Mocha
        run: npm run mocha:${{ matrix.suite }}

      - name: Chest
        if: matrix.suite == 'node'
        run: npm run chest

      - name: Axios installed
        if: matrix.suite == 'node'
        run: |
          npm i axios -D
          npm run node-test:node
          git checkout package.json
